services:
  - type: web
    name: book-api
    runtime: docker
    plan: free
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: book-db
          property: connectionString
      - key: PORT
        value: 3000

databases:
  - name: book-db
    plan: free
    databaseName: bookdb
    user: myuser